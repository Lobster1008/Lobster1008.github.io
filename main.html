<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>優惠雷達彙整站</title>

  <script>
    (function (win, export_obj) {
      win["TeaAnalyticsObject"] = export_obj;
      if (!win[export_obj]) {
        function _collect() { _collect.q.push(arguments); }
        _collect.q = _collect.q || [];
        win[export_obj] = _collect;
      }
      win[export_obj].l = +new Date();
    })(window, "collectEvent");
  </script>

  <script>
    window.collectEvent("init", {
      app_id: 10000047,
      channel_domain: "https://cdp.altatech.tw",
      autotrack: true, // 開啟自動點擊追蹤
      log: true // 在 Console 顯示發送日誌，方便調試
    });
    window.collectEvent("start");
  </script>

  <script async src="./collect-rangers-v5.2.1.js"></script>

  <style>
    /* 這裡使用您圖中的粉色系配色 */
    :root { --accent: #ff5fa2; --bg: #fff7fb; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
    .app { max-width: 900px; margin: 0 auto; }
    .search-bar { width: 100%; padding: 12px; border: 2px solid var(--accent); border-radius: 8px; margin-bottom: 20px; box-sizing: border-box; }
    .filter-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .btn-tag { padding: 8px 16px; border: 1px solid #ddd; border-radius: 20px; background: #fff; cursor: pointer; }
    .btn-tag.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .main-grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
    .deal-item { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
    .deal-item:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .deal-item.selected { border-color: var(--accent); background: #fff0f5; }
    .preview-box { background: #fff; padding: 20px; border-radius: 12px; position: sticky; top: 20px; min-height: 200px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .btn-link { display: block; text-align: center; background: var(--accent); color: #fff; padding: 10px; border-radius: 6px; text-decoration: none; margin-top: 15px; }
    @media (max-width: 700px) { .main-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="app">
    <h1>🎁 優惠雷達聚合站</h1>
    
    <input type="text" id="searchInput" class="search-bar" placeholder="搜尋店家或優惠..." />

    <div class="filter-group" id="filterGroup">
      <button class="btn-tag active" data-type="all">全部</button>
      <button class="btn-tag" data-type="student">學生</button>
      <button class="btn-tag" data-type="birthday">壽星</button>
    </div>

    <div class="main-grid">
      <div id="listContainer"></div>
      <div class="preview-box" id="previewBox">
        <p style="color: #888;">請選擇左側優惠查看詳情</p>
      </div>
    </div>
  </div>

  <script>
    const deals = [
      { id: 101, store: "星巴克", title: "全品項買一送一", type: "all", desc: "限時指定時段優惠...", link: "https://starbucks.com.tw" },
      { id: 102, store: "麥當勞", title: "學生套餐 89 元起", type: "student", desc: "憑有效學生證...", link: "https://mcdonalds.com.tw" },
      { id: 103, store: "陶板屋", title: "壽星當月 5 折", type: "birthday", desc: "生日專屬好禮...", link: "https://tokiya.com.tw" }
    ];

    let currentFilter = 'all';
    let searchTimer = null;

    // 渲染列表
    function render() {
      const keyword = document.getElementById('searchInput').value.toLowerCase();
      const container = document.getElementById('listContainer');
      
      const filtered = deals.filter(d => 
        (currentFilter === 'all' || d.type === currentFilter) &&
        (d.store.includes(keyword) || d.title.includes(keyword))
      );

      container.innerHTML = filtered.map(d => `
        <div class="deal-item" onclick="viewDetail(${d.id})" data-id="${d.id}">
          <small>${d.store}</small>
          <div style="font-size: 18px; font-weight: bold; margin-top: 5px;">${d.title}</div>
        </div>
      `).join('');
      
      // 觸發一次曝光偵測
      checkExposure();
    }

    // 查看詳情並點擊埋點
    function viewDetail(id) {
      const deal = deals.find(d => d.id === id);
      const box = document.getElementById('previewBox');
      
      // 更新選中樣式
      document.querySelectorAll('.deal-item').forEach(el => {
        el.classList.toggle('selected', parseInt(el.dataset.id) === id);
      });

      box.innerHTML = `
        <h3>${deal.store}</h3>
        <p>${deal.title}</p>
        <p style="color: #666; font-size: 14px;">${deal.desc}</p>
        <a href="${deal.link}" class="btn-link" onclick="trackGo('${deal.store}')">前往官網 ↗</a>
      `;

      // 埋點：點擊優惠卡片
      window.collectEvent("deal_card_click", {
        deal_id: id,
        deal_store: deal.store,
        from_filter: currentFilter
      });
    }

    // 埋點：轉換跳轉
    function trackGo(store) {
      window.collectEvent("conversion_exit", {
        target_store: store,
        page_source: "github_main"
      });
    }

    // 搜尋埋點（防抖）
    document.getElementById('searchInput').addEventListener('input', () => {
      render();
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        const val = document.getElementById('searchInput').value;
        if(val) window.collectEvent("search_action", { keyword: val });
      }, 1000);
    });

    // 分類篩選埋點
    document.getElementById('filterGroup').addEventListener('click', (e) => {
      if(e.target.classList.contains('btn-tag')) {
        currentFilter = e.target.dataset.type;
        document.querySelectorAll('.btn-tag').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        render();
        window.collectEvent("filter_change", { filter_type: currentFilter });
      }
    });

    // 曝光埋點（偵測卡片出現在螢幕上）
    function checkExposure() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if(entry.isIntersecting) {
            const id = entry.target.dataset.id;
            window.collectEvent("$bav2b_exposure", {
              exposure_type: "card",
              deal_id: id
            });
            observer.unobserve(entry.target); // 偵測過後就停止追蹤，避免重複觸發
          }
        });
      }, { threshold: 0.5 });

      document.querySelectorAll('.deal-item').forEach(el => observer.observe(el));
    }

    render();
  </script>
</body>
</html>
